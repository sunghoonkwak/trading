<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Event Viewer</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <h1>
                <span class="logo">📈</span>
                Trading Event Viewer
            </h1>
            <div class="header-controls">
                <button class="toggle-btn" id="mkt-toggle" title="Toggle MKT logs">
                    📊 MKT
                </button>
                <button class="control-btn" onclick="triggerReport('portfolio')">
                    📁 Port Report
                </button>
                <button class="control-btn" onclick="triggerReport('order')">
                    🛒 Order Report
                </button>
                <div class="connection-status" id="connection-status">
                    <span class="status-dot disconnected"></span>
                    <span class="status-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Main Content - 2 Columns (7:3) -->
        <main class="main-content">
            <!-- Left Column: Orders & Quotes (70%) -->
            <div class="col-left">
                <!-- Orders Panel -->
                <section class="viewer-section orders-section">
                    <div class="section-header">
                        <h3>📋 Orders</h3>
                        <span class="section-count" id="orders-count">0</span>
                    </div>
                    <div class="section-content" id="orders-panel">
                        <div class="empty-state">No orders</div>
                    </div>
                </section>

                <!-- Quotes Panel -->
                <section class="viewer-section quotes-section">
                    <div class="section-header">
                        <h3>📈 Quotes</h3>
                        <span class="section-count" id="quotes-count">0</span>
                    </div>
                    <div class="section-content" id="quotes-panel">
                        <div class="empty-state">Waiting for quotes...</div>
                    </div>
                </section>
            </div>

            <!-- Right Column: System Log (30%) -->
            <div class="col-right">
                <!-- System Log Panel -->
                <section class="viewer-section log-section">
                    <div class="section-header">
                        <h3>📜 System Log</h3>
                        <div class="log-controls">
                            <span class="section-count" id="log-count">0</span>
                            <button class="control-btn" id="btn-auto-scroll" onclick="toggleAutoScroll()">
                                Auto-Scroll: ON
                            </button>
                            <button class="control-btn" onclick="clearLogs()">
                                Clear
                            </button>
                        </div>
                    </div>
                    <div class="section-content log-content" id="log-panel">
                        <div class="log-entry info">[System] Event Viewer Ready</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Ticker Detail Modal -->
    <div id="ticker-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="closeTickerModal()">&times;</button>
            <div class="modal-header">
                <h2 id="modal-title">Ticker Details</h2>
                <div class="modal-badges" id="modal-badges"></div>
            </div>

            <div class="modal-body">
                <!-- Top: TradingView Chart -->
                <div class="chart-container" id="tv-chart-container">
                    <!-- TradingView Widget will be injected here -->
                </div>

                <!-- Bottom: Holdings Info -->
                <div class="holdings-container" id="modal-holdings">
                    <div class="loading-holdings">Loading holdings data...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cancel Confirmation Modal -->
    <div id="cancel-confirm-modal" class="modal-overlay hidden">
        <div class="confirm-dialog">
            <p>Cancel order for <span id="cancel-ticker" class="cancel-ticker-name"></span>?</p>
            <div class="confirm-buttons">
                <button class="btn-confirm btn-yes" onclick="confirmCancel()">Yes</button>
                <button class="btn-confirm btn-no" onclick="closeCancelModal()">No</button>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="/static/app.js"></script>
    <script>
        async function triggerReport(type) {
            if (!confirm(`Run ${type} report now?`)) return;

            try {
                const response = await fetch(`/api/trigger/${type}`, { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    alert(`${type} report triggered successfully!`);
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (e) {
                alert(`Request failed: ${e}`);
            }
        }
    </script>
</body>

</html>
