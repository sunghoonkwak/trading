services:
  trading-bot:
    build: .
    container_name: my-trading-bot
    restart: always
    ports:
      - "8080:8080"
    user: "1000:1000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV_MODE=docker
      - HOME=/app
      - TZ=Asia/Seoul
      - WEB_ENABLE_ORDER_CANCEL=true
      - WEB_ENABLE_MANUAL_REPORT_TRIGGERS=false
    # env_file:
    #  - .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - .:/app  # 코드를 수정하면 바로 반영되도록 연결
      - /home/sunghoon/KIS_config:/app/KIS_config  # KIS 설정 파일 (private, git 미포함)
